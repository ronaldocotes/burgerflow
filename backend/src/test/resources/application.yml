spring:
  jpa:
    # Schema is owned by Flyway; without an explicit ddl-auto, Spring Boot 3.5
    # probes the routing datasource at EMF boot (isEmbedded) and fails with
    # "No tenant bound". This test YAML shadows the main one on the test classpath.
    hibernate:
      ddl-auto: none

# Test overrides. Login rate-limit is OFF by default for the suite because
# MockMvc always reports 127.0.0.1 (one shared bucket would trip across classes).
# LoginRateLimitTest re-enables it via @DynamicPropertySource (highest precedence).
menuflow:
  rate-limit:
    login:
      enabled: false
    public-orders:
      enabled: false
  # Job de reconciliacao PIX desligado nos testes: o @Scheduled nao deve disparar
  # contra o Postgres compartilhado da suite (varreria os tenants de outros casos).
  asaas:
    reconcile:
      enabled: false
  # Job de recuperacao de carrinho desligado nos testes (o @Scheduled nao deve disparar
  # contra o Postgres compartilhado). Delays de envio em 0 -> sem espera no processAbandonedCarts.
  cart-recovery:
    enabled: false
    send-delay-min-seconds: 0
    send-delay-max-seconds: 0
