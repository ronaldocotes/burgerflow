# Mesmo context-path da producao (application.yml principal): este YAML SOMBREIA
# o principal no classpath de teste, e sem isto o handshake WebSocket dos testes
# rodaria em /ws enquanto producao serve /api/v1/ws — o teste nao provaria o
# caminho real (foi exatamente o bug do KDS: cliente em /ws -> 404).
server:
  servlet:
    context-path: /api/v1

spring:
  jpa:
    # Schema is owned by Flyway; without an explicit ddl-auto, Spring Boot 3.5
    # probes the routing datasource at EMF boot (isEmbedded) and fails with
    # "No tenant bound". This test YAML shadows the main one on the test classpath.
    hibernate:
      ddl-auto: none

# Test overrides. Login rate-limit is OFF by default for the suite because
# MockMvc always reports 127.0.0.1 (one shared bucket would trip across classes).
# LoginRateLimitTest re-enables it via @DynamicPropertySource (highest precedence).
menuflow:
  rate-limit:
    login:
      enabled: false
    public-orders:
      enabled: false
  # Job de reconciliacao PIX desligado nos testes: o @Scheduled nao deve disparar
  # contra o Postgres compartilhado da suite (varreria os tenants de outros casos).
  asaas:
    reconcile:
      enabled: false
  # Job de recuperacao de carrinho desligado nos testes (o @Scheduled nao deve disparar
  # contra o Postgres compartilhado). Delays de envio em 0 -> sem espera no processAbandonedCarts.
  cart-recovery:
    enabled: false
    send-delay-min-seconds: 0
    send-delay-max-seconds: 0
  # Job de despacho de conversoes desligado nos testes (o @Scheduled nao deve disparar
  # contra o Postgres compartilhado nem fazer HTTP real para Meta/Google).
  conversions:
    enabled: false
  # Job de expiracao de ofertas de entrega desligado nos testes (o @Scheduled nao deve
  # disparar contra o Postgres compartilhado nem varrer tenants de outros casos).
  delivery:
    expiry:
      enabled: false
  # Motor de despacho por grupo (Fase B1) desligado nos testes: o @Scheduled nao deve
  # varrer tenants nem criar ofertas contra o Postgres compartilhado da suite.
  dispatch:
    enabled: false
  # Agendador de campanhas desligado nos testes (o @Scheduled nao deve varrer tenants
  # nem disparar campanhas contra o Postgres compartilhado da suite).
  campaign-scheduler:
    enabled: false

# Cifracao de tokens iFood: chave de TESTE valida (32 bytes / 256 bits em Base64).
# Decodifica para 'testkeytestkeytestkeytestkey1234' (exatamente 32 bytes).
ifood:
  encryption:
    key: "dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleTEyMzQ="
