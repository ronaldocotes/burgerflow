spring:
  application:
    name: burgerflow-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # NOTE: Spring Boot DataSourceAutoConfiguration is EXCLUDED in
  # BurgerFlowApplication. Datasources are defined explicitly:
  #  - control (burgerflow_control) in ControlDataSourceConfig
  #  - per-tenant routing in TenantDataSourceConfig
  # Multi-tenancy is DATABASE-PER-TENANT, not Hibernate SCHEMA multitenancy.

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: 5000

  cache:
    type: ${SPRING_CACHE_TYPE:simple}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: burgerflow-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    mime-types: application/json,text/plain

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.burgerflow: ${LOGGING_LEVEL_COM_BURGERFLOW:INFO}
    org.springframework: WARN
    org.hibernate: WARN

# BurgerFlow multi-tenant connection template (database-per-tenant)
burgerflow:
  tenant:
    host: ${BF_DB_HOST:localhost:5432}
    username: ${BF_DB_USER:burgerflow}
    password: ${BF_DB_PASSWORD:burgerflow123}
    db-prefix: ${BF_DB_PREFIX:tenant_}
    maintenance-db: ${BF_DB_MAINTENANCE:postgres}
    control-db: ${BF_DB_CONTROL:burgerflow_control}
    pool-size-per-tenant: ${BF_DB_POOL:5}
    auto-create-database: ${BF_DB_AUTOCREATE:true}
  jwt:
    secret: ${BF_JWT_SECRET:change-me-in-prod-burgerflow-dev-secret-key-256bits!}
    access-ttl-seconds: ${BF_JWT_ACCESS_TTL:3600}
    refresh-ttl-seconds: ${BF_JWT_REFRESH_TTL:604800}
    issuer: burgerflow
  # Login rate limit (Sprint 2): 5 attempts / 60s per client IP.
  # backend=redis shares the counter across instances (needs Spring Redis);
  # backend=memory (default) is node-local Bucket4j.
  rate-limit:
    login:
      enabled: ${BF_RATELIMIT_LOGIN_ENABLED:true}
      backend: ${BF_RATELIMIT_LOGIN_BACKEND:memory}
      capacity: ${BF_RATELIMIT_LOGIN_CAPACITY:5}
      refill-period-seconds: ${BF_RATELIMIT_LOGIN_PERIOD:60}
