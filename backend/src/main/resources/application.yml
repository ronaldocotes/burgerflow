spring:
  application:
    name: menuflow-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # NOTE: Spring Boot DataSourceAutoConfiguration is EXCLUDED in
  # MenuFlowApplication. Datasources are defined explicitly:
  #  - control (menuflow_control) in ControlDataSourceConfig
  #  - per-tenant routing in TenantDataSourceConfig
  # Multi-tenancy is DATABASE-PER-TENANT, not Hibernate SCHEMA multitenancy.

  jpa:
    open-in-view: false
    # ddl-auto EXPLICITLY none: schema is owned by Flyway (control + per-tenant).
    # Without this, Spring Boot 3.5 probes the datasource at EMF boot to derive a
    # default ddl-auto (EmbeddedDatabaseConnection.isEmbedded -> getConnection),
    # which routes through the tenant DataSource before any tenant is bound and
    # fails with "No tenant bound". Setting it short-circuits that probe.
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: 5000

  cache:
    type: ${SPRING_CACHE_TYPE:simple}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: menuflow-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    mime-types: application/json,text/plain

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.menuflow: ${LOGGING_LEVEL_COM_MENUFLOW:INFO}
    org.springframework: WARN
    org.hibernate: WARN

# MenuFlow multi-tenant connection template (database-per-tenant)
menuflow:
  tenant:
    host: ${MF_DB_HOST:localhost:5432}
    username: ${MF_DB_USER:menuflow}
    password: ${MF_DB_PASSWORD:menuflow123}
    db-prefix: ${MF_DB_PREFIX:tenant_}
    maintenance-db: ${MF_DB_MAINTENANCE:postgres}
    control-db: ${MF_DB_CONTROL:menuflow_control}
    pool-size-per-tenant: ${MF_DB_POOL:5}
    auto-create-database: ${MF_DB_AUTOCREATE:true}
  jwt:
    secret: ${MF_JWT_SECRET:change-me-in-prod-menuflow-dev-secret-key-256bits!}
    access-ttl-seconds: ${MF_JWT_ACCESS_TTL:3600}
    refresh-ttl-seconds: ${MF_JWT_REFRESH_TTL:604800}
    issuer: menuflow
  # Login rate limit (Sprint 2): 5 attempts / 60s per client IP.
  # backend=redis shares the counter across instances (needs Spring Redis);
  # backend=memory (default) is node-local Bucket4j.
  rate-limit:
    login:
      enabled: ${MF_RATELIMIT_LOGIN_ENABLED:true}
      backend: ${MF_RATELIMIT_LOGIN_BACKEND:memory}
      capacity: ${MF_RATELIMIT_LOGIN_CAPACITY:5}
      refill-period-seconds: ${MF_RATELIMIT_LOGIN_PERIOD:60}
