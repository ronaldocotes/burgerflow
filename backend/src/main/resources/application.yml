spring:
  application:
    name: menuflow-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # NOTE: Spring Boot DataSourceAutoConfiguration is EXCLUDED in
  # MenuFlowApplication. Datasources are defined explicitly:
  #  - control (menuflow_control) in ControlDataSourceConfig
  #  - per-tenant routing in TenantDataSourceConfig
  # Multi-tenancy is DATABASE-PER-TENANT, not Hibernate SCHEMA multitenancy.

  jpa:
    open-in-view: false
    # ddl-auto EXPLICITLY none: schema is owned by Flyway (control + per-tenant).
    # Without this, Spring Boot 3.5 probes the datasource at EMF boot to derive a
    # default ddl-auto (EmbeddedDatabaseConnection.isEmbedded -> getConnection),
    # which routes through the tenant DataSource before any tenant is bound and
    # fails with "No tenant bound". Setting it short-circuits that probe.
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: 5000

  cache:
    type: ${SPRING_CACHE_TYPE:simple}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: menuflow-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    mime-types: application/json,text/plain
    # Upload do APK do app do motoboy (POST /admin/app/releases) vai como
    # application/octet-stream no corpo — NAO e multipart nem form, entao os limites de
    # multipart/form-post NAO se aplicam (o teto de ~150 MB e imposto no
    # AppReleaseService, e o controller rejeita cedo por Content-Length antes de
    # bufferizar). max-swallow-size delimita quantos bytes o Tomcat "engole" de um corpo
    # NAO lido quando a requisicao e rejeitada antes do fim (ex.: 401/403/413/409 num
    # upload) para manter a conexao viva e o cliente receber o status limpo. Antes era
    # -1 (ILIMITADO) — um upload rejeitado podia fazer o Tomcat engolir bytes sem teto
    # (risco de DoS). 160 MB da folga sobre o teto de 150 MB do APK: um upload no limite
    # ainda recebe resposta limpa; um corpo gigante alem disso tem a conexao resetada
    # (nao lhe devemos uma resposta bonita).
    max-swallow-size: 160MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.menuflow: ${LOGGING_LEVEL_COM_MENUFLOW:INFO}
    org.springframework: WARN
    org.hibernate: WARN

# MenuFlow multi-tenant connection template (database-per-tenant)
menuflow:
  app:
    base-url: ${MENUFLOW_APP_BASE_URL:http://localhost:3000}
  tenant:
    host: ${MF_DB_HOST:localhost:5432}
    username: ${MF_DB_USER:menuflow}
    password: ${MF_DB_PASSWORD:menuflow123}
    db-prefix: ${MF_DB_PREFIX:tenant_}
    maintenance-db: ${MF_DB_MAINTENANCE:postgres}
    control-db: ${MF_DB_CONTROL:menuflow_control}
    pool-size-per-tenant: ${MF_DB_POOL:5}
    auto-create-database: ${MF_DB_AUTOCREATE:true}
  jwt:
    secret: ${MF_JWT_SECRET:change-me-in-prod-menuflow-dev-secret-key-256bits!}
    access-ttl-seconds: ${MF_JWT_ACCESS_TTL:3600}
    refresh-ttl-seconds: ${MF_JWT_REFRESH_TTL:604800}
    issuer: menuflow
  # Login rate limit (Sprint 2): 5 attempts / 60s per client IP.
  # backend=redis shares the counter across instances (needs Spring Redis);
  # backend=memory (default) is node-local Bucket4j.
  rate-limit:
    login:
      enabled: ${MF_RATELIMIT_LOGIN_ENABLED:true}
      backend: ${MF_RATELIMIT_LOGIN_BACKEND:memory}
      capacity: ${MF_RATELIMIT_LOGIN_CAPACITY:5}
      refill-period-seconds: ${MF_RATELIMIT_LOGIN_PERIOD:60}
    # Public order placement limit: 20 / 60s per client IP (only unauthenticated write).
    public-orders:
      enabled: ${MF_RATELIMIT_PUBLICORDERS_ENABLED:true}
      backend: ${MF_RATELIMIT_PUBLICORDERS_BACKEND:memory}
      capacity: ${MF_RATELIMIT_PUBLICORDERS_CAPACITY:20}
      refill-period-seconds: ${MF_RATELIMIT_LOGIN_PERIOD:60}
  # Asaas (Fase 2.3): integracao PIX. A api-key NUNCA tem default em prod (env).
  # Reconciliacao periodica das cobrancas pendentes vencidas (desligavel).
  asaas:
    reconcile:
      enabled: ${MF_ASAAS_RECONCILE_ENABLED:true}

# Integracao Asaas (PIX). Auth por header access_token (NAO Bearer). Sandbox por
# default; em producao defina ASAAS_BASE_URL=https://api.asaas.com/api/v3 e a chave.
asaas:
  base-url: ${ASAAS_BASE_URL:https://sandbox.asaas.com/api/v3}
  api-key: ${ASAAS_API_KEY:}

# WAHA (WhatsApp HTTP API) — notificacao de status de pedido ao cliente (Fase 2.4).
# Na A1 o WAHA Core roda na rede interna sem auth; em prod aponte para 127.0.0.1:3030.
# Envio e fail-open: falha aqui nunca quebra o fluxo do pedido.
waha:
  base-url: ${WAHA_BASE_URL:http://127.0.0.1:3030}

# OSRM (Fase B2+) — calculo de distancia rodoviaria self-hosted na A1 (Oracle Ampere,
# custo zero, sem limite de chamadas). Quando OSRM_BASE_URL esta vazio o provider
# e ignorado e o DistanceService cai na cadeia Google->Haversine.
# Capataz confirma o endereco exato do gateway; use host.docker.internal se o
# backend rodar em container Docker na mesma A1.
osrm:
  base-url: ${OSRM_BASE_URL:}

# LiteLLM (Fase 4.1) — gateway OpenAI-compatible self-hosted na A1 que unifica
# Gemini/Grok/Claude/Mistral. O Copiloto chama POST /chat/completions. A chave e
# opcional (Bearer); o modelo e configuravel. Defaults inline tambem existem no
# LiteLLMClient porque o application.yml de teste sombreia este (e mocka o cliente).
litellm:
  url: ${LITELLM_URL:http://127.0.0.1:4000}
  key: ${LITELLM_KEY:}
  model: ${LITELLM_MODEL:mistral-small-latest}
  timeout-ms: ${LITELLM_TIMEOUT_MS:30000}

# Integracao iFood (Fase 5.1a). Polling DESABILITADO por padrao: o job so vira
# bean quando ifood.polling.enabled=true (ver IfoodPollingJob @ConditionalOnProperty).
ifood:
  # URL base da API publica do iFood. Default aponta para o ambiente de producao;
  # sobrescreva IFOOD_API_URL em homologacao. Usado pelo health check de plataforma.
  base-url: ${IFOOD_API_URL:https://merchant-api.ifood.com.br}
  polling:
    enabled: false
    interval-ms: 30000
  # Cifracao AES-256-GCM dos tokens iFood (client_secret/app_token/access/refresh).
  # Placeholder so para dev/boot; em producao defina IFOOD_ENCRYPTION_KEY
  # (32 bytes / 256 bits em Base64) via env / .env.prod na A1.
  encryption:
    key: ${IFOOD_ENCRYPTION_KEY:PLACEHOLDER_32_BYTES_BASE64_KEY==}

# Integracao Open Delivery (99Food / Rappi) — Fase 5.5a. Polling DESABILITADO
# por padrao: o job so vira bean quando open-delivery.polling.enabled=true (ver
# OpenDeliveryPollingJob @ConditionalOnProperty). Auth OAuth2 client_credentials.
open-delivery:
  polling:
    enabled: false
    interval-ms: 30000

# Resilience4j: circuit breaker + retry das chamadas ao Asaas; e o CB/rate-limiter
# do iFood (config nomeada 'ifoodTenantAction' reutilizavel por acao de tenant, e
# rate-limiter global da conta iFood). Config so declarada aqui; a aplicacao dos
# @CircuitBreaker/@RateLimiter reais entra na 5.1b junto do cliente HTTP do iFood.
resilience4j:
  circuitbreaker:
    configs:
      ifoodTenantAction:
        sliding-window-type: TIME_BASED
        sliding-window-size: 60
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-duration-threshold: 3s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      asaas:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  ratelimiter:
    instances:
      ifoodAccountGlobal:
        limit-for-period: 5000
        limit-refresh-period: 1m
        timeout-duration: 5s
  retry:
    instances:
      asaas:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
