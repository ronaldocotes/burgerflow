name: Continuous Integration

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - hotfix/**
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Backend Tests
  # ============================================================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: burgerflow
          POSTGRES_PASSWORD: burgerflow123
          POSTGRES_DB: burgerflow
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Build with Gradle
        run: |
          cd backend
          ./gradlew build --no-daemon --stacktrace
      
      - name: Run Unit Tests
        run: |
          cd backend
          ./gradlew test --no-daemon --stacktrace --tests "com.burgerflow.*"
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/build/reports/tests/

  # ============================================================================
  # Frontend Tests
  # ============================================================================
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Cache Next.js
        uses: actions/cache@v3
        with:
          path: |
            frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Type Check
        run: |
          cd frontend
          npm run type-check
      
      - name: Lint
        run: |
          cd frontend
          npm run lint
      
      - name: Run Unit Tests
        run: |
          cd frontend
          npm test
      
      - name: Build
        run: |
          cd frontend
          npm run build
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: frontend/coverage/

  # ============================================================================
  # Mobile Tests
  # ============================================================================
  test-mobile:
    name: Mobile Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      
      - name: Cache React Native
        uses: actions/cache@v3
        with:
          path: |
            mobile/node_modules
          key: ${{ runner.os }}-rn-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-rn-
      
      - name: Install dependencies
        run: |
          cd mobile
          npm ci
      
      - name: Type Check
        run: |
          cd mobile
          npm run type-check
      
      - name: Lint
        run: |
          cd mobile
          npm run lint
      
      - name: Run Unit Tests
        run: |
          cd mobile
          npm test

  # ============================================================================
  # IA Tests
  # ============================================================================
  test-ia:
    name: IA Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: burgerflow
          POSTGRES_PASSWORD: burgerflow123
          POSTGRES_DB: burgerflow
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ia/requirements.txt
      
      - name: Install dependencies
        run: |
          cd ia
          pip install --no-cache-dir -r requirements.txt
      
      - name: Run Unit Tests
        run: |
          cd ia
          pytest tests/ -v --cov=app --cov-report=xml
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ia-test-results
          path: ia/

  # ============================================================================
  # SonarQube Analysis
  # ============================================================================
  sonarqube:
    name: SonarQube Analysis
    needs: [test-backend, test-frontend, test-ia]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        with:
          args: |
            -Dsonar.projectKey=burgerflow
            -Dsonar.projectName=BurgerFlow
            -Dsonar.projectVersion=1.0.0
            -Dsonar.sources=backend/src,frontend/src,ia/app,mobile/src
            -Dsonar.tests=backend/src/test,frontend/src,ia/tests,mobile/src
            -Dsonar.test.inclusions=**/*Test*,**/*Spec*,**/*test*,**/__tests__/**
            -Dsonar.exclusions=**/node_modules/**,**/build/**,**/.next/**,**/android/**,**/ios/**,**/dist/**,**/coverage/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}

  # ============================================================================
  # Build Docker Images
  # ============================================================================
  build-docker:
    name: Build Docker Images
    needs: [test-backend, test-frontend, test-ia]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/burgerflow-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/burgerflow-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/burgerflow-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/burgerflow-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push IA image
        uses: docker/build-push-action@v5
        with:
          context: ia
          file: ia/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/burgerflow-ia:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/burgerflow-ia:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Security Scan
  # ============================================================================
  security-scan:
    name: Security Scan
    needs: [test-backend, test-frontend, test-ia]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          format: 'table'
          output: 'trivy-results.txt'
      
      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: trivy-results.txt

  # ============================================================================
  # Notify
  # ============================================================================
  notify:
    name: Notify
    needs: [test-backend, test-frontend, test-mobile, test-ia, sonarqube, build-docker, security-scan]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Send Slack Notification
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status == 'success' && '#36a64f' || '#ff0000' }}
          SLACK_TITLE: "CI Pipeline - BurgerFlow"
          SLACK_MESSAGE: "Status: ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}"
          SLACK_FOOTER: "Commit: ${{ github.sha }}"
